<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Promo Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 font-sans min-h-screen pb-12">

    <header class="bg-blue-600 text-white text-center py-6 px-4 shadow-md sticky top-0 z-50">
        <h1 class="text-3xl font-black tracking-wide">🇨🇼 Local Discount Hub</h1>
        <p class="text-sm text-blue-100 mt-1 font-medium">Your neighborhood alliance shared promo network</p>
    </header>

    <main class="max-w-md mx-auto px-4 mt-6 space-y-6" id="hub-container">
        <div id="hub-loading" class="text-center py-12 font-bold text-gray-500">⏳ Accessing Live Community Feed...</div>
    </main>

    <script>
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwXYdojCYrzDOQo8B8zsZ5_vLo7c-Afxo9ddIS-J8XHcM9HkOqJuNZvLgOYdkZTiGnb/exec";

        const container = document.getElementById('hub-container');
        const loadingEl = document.getElementById('hub-loading');

        fetch(`${GOOGLE_SCRIPT_URL}?action=getAll`)
        .then(res => res.json())
        .then(rows => {
            if (loadingEl) loadingEl.classList.add('hidden');

            if (!rows || !Array.isArray(rows) || rows.length === 0) {
                container.innerHTML = `<div class="text-center text-gray-500 font-bold py-12">📍 No active promotions found in the database.</div>`;
                return;
            }

            // Clean, ultra-safe filtering checking both uppercase and lowercase properties
            const activeAds = rows.filter(row => {
                const currentStatus = row.Status || row.status || "";
                return currentStatus.toString().trim().toLowerCase() === "active";
            });

            if (activeAds.length === 0) {
                container.innerHTML = `<div class="text-center text-gray-500 font-bold py-12">📍 No active promotions in the network right now. Check back soon!</div>`;
                return;
            }

            // Render out the scrolling cards
            let cardsHtml = "";
            activeAds.reverse().forEach(ad => {
                // Read properties carefully matching your exact backend JSON layout keys
                const adId = ad.Ad_ID || ad.id || "";
                const imgUrl = ad.Photo_URL || ad.photo || "https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=600";
                const promoText = ad.Promo_Text || ad.text || "Special Offer!";
                const contactNum = ad.Contact_Info || ad.contact || "";
                const communityTag = ad.Social_Links || ad.community || ad.Business_Name || "OTRABANDA";
                const expiryRaw = ad.Expiry_Date || ad.expiry || "Ongoing";
                
                const cleanNum = contactNum.replace(/\D/g, '');
                const displayDate = expiryRaw.includes('T') ? expiryRaw.split('T')[0] : expiryRaw;

                cardsHtml += `
                    <div class="bg-white rounded-3xl shadow-xl overflow-hidden border border-gray-200 my-4">
                        <div class="relative">
                            <img src="${imgUrl}" class="w-full h-64 object-cover" onerror="this.src='https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=600'">
                            <span class="absolute top-3 left-3 bg-blue-600 text-white text-xs font-black px-3 py-1 rounded-full uppercase tracking-wider shadow-md">
                                📍 ${communityTag}
                            </span>
                        </div>

                        <div class="p-5 space-y-4">
                            <p class="text-xl font-extrabold text-gray-900 break-words">"${promoText}"</p>
                            
                            <div class="bg-blue-50 p-3 rounded-xl border border-blue-100 flex justify-between items-center">
                                <span class="text-xs font-black text-blue-500 uppercase">Claim Offer:</span>
                                <a href="https://wa.me/${cleanNum}" target="_blank" class="text-md font-black text-blue-600 underline">
                                    💬 ${contactNum}
                                </a>
                            </div>

                            <div class="text-[11px] font-bold text-red-500 bg-red-50 px-3 py-1.5 rounded-lg inline-block">
                                ⏰ Valid Until: ${displayDate}
                            </div>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = cardsHtml;
        })
        .catch(err => {
            console.error("Hub render error:", err);
            if (loadingEl) {
                loadingEl.innerHTML = `<span class="text-red-500 font-bold">❌ Connection Error. could not read spreadsheet rows.</span>`;
            }
        });
    </script>
</body>
</html>
