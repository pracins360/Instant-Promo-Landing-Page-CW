<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Promo Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 font-sans min-h-screen pb-12">

    <header class="bg-blue-600 text-white text-center py-6 px-4 shadow-md sticky top-0 z-50">
        <h1 class="text-3xl font-black tracking-wide">🇨🇼 Local Discount Hub</h1>
        <p class="text-sm text-blue-100 mt-1 font-medium">Your neighborhood alliance shared promo network</p>
    </header>

    <main class="max-w-md mx-auto px-4 mt-6 space-y-6" id="hub-container">
        <div id="hub-loading" class="text-center py-12 font-bold text-gray-500">⏳ Accessing Live Community Feed...</div>
    </main>

    <script>
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwXYdojCYrzDOQo8B8zsZ5_vLo7c-Afxo9ddIS-J8XHcM9HkOqJuNZvLgOYdkZTiGnb/exec";

        // Fetch all rows from database
        fetch(`${GOOGLE_SCRIPT_URL}?action=getAll`)
        .then(res => res.json())
        .then(rows => {
            const container = document.getElementById('hub-container');
            document.getElementById('hub-loading').classList.add('hidden');

            // Filter out only completely "Active" promos to display to the public
            const activeAds = rows.filter(row => row.Status === "Active");

            if (activeAds.length === 0) {
                container.innerHTML = `<div class="text-center text-gray-500 font-bold py-12">📍 No active promotions in the network right now. Check back soon!</div>`;
                return;
            }

            // Loop through and build vertical scrollable list cards
            activeAds.reverse().forEach(ad => {
                const contactNum = ad.Contact_Info || "";
                const cleanNum = contactNum.replace(/\D/g, '');
                const communityTag = ad.Social_Links || ad.Business_Name || "Solo";

                const cardHtml = `
                    <div class="bg-white rounded-3xl shadow-xl overflow-hidden border border-gray-200 transition-transform duration-200 hover:scale-[1.01]">
                        <div class="relative">
                            <img src="${ad.Photo_URL || 'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=600'}" class="w-full h-64 object-cover">
                            <span class="absolute top-3 left-3 bg-blue-600 text-white text-xs font-black px-3 py-1 rounded-full uppercase tracking-wider shadow-md">
                                📍 ${communityTag}
                            </span>
                        </div>

                        <div class="p-5 space-y-4">
                            <p class="text-xl font-extrabold text-gray-900 break-words">"${ad.Promo_Text}"</p>
                            
                            <div class="bg-blue-50 p-3 rounded-xl border border-blue-100 flex justify-between items-center">
                                <span class="text-xs font-black text-blue-500 uppercase">Claim Offer:</span>
                                <a href="https://wa.me/${cleanNum}" target="_blank" class="text-md font-black text-blue-600 underline">
                                    💬 ${contactNum}
                                </a>
                            </div>

                            <div class="text-[11px] font-bold text-red-500 bg-red-50 px-3 py-1.5 rounded-lg inline-block">
                                ⏰ Valid Until: ${ad.Expiry_Date ? ad.Expiry_Date.split('T')[0] : 'Ongoing'}
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += cardHtml;
            });
        })
        .catch(err => {
            console.error(err);
            document.getElementById('hub-loading').innerText = "❌ Failed to load community feed. Please refresh.";
        });
    </script>
</body>
</html>
