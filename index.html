<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Your Promo Page</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 font-sans p-4 min-h-screen flex flex-col items-center">

    <div class="w-full max-w-xl bg-white rounded-3xl shadow-xl p-6 my-4 border-4 border-blue-500">
        <h1 class="text-3xl font-extrabold text-center text-gray-800 mb-1">🚀 Launch Your Promo</h1>
        <p class="text-center text-sm text-gray-500 mb-6">Simple, text-only submission for maximum speed.</p>

        <form id="promo-form" class="space-y-5">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Select Tier</label>
                    <select id="tier" class="w-full p-3 border-2 border-gray-300 rounded-xl font-bold bg-white">
                        <option value="basic">⭐ Basic (1 Photo - 2 AI requests/wk)</option>
                        <option value="gold">👑 Gold (2 Photos - 3 AI requests/wk)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Target Community</label>
                    <select id="community" class="w-full p-3 border-2 border-gray-300 rounded-xl font-bold bg-white">
                        <option value="solo">🌐 Go Solo (Independent Page)</option>
                        <option value="punda">🏙️ Punda.com</option>
                        <option value="salina">🛍️ Salina.com</option>
                                                <option value="otrabanda">🛍️ Otrabanda.com</option>
                        <option value="sambil">🏬 Sambil.com</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="block text-lg font-bold text-gray-700 mb-1">What is the Deal?</label>
                <textarea id="promo-text" rows="3" placeholder="Example: 20% Off all lunch platters today only!" class="w-full p-4 border-2 border-gray-300 rounded-xl text-lg font-medium" required></textarea>
            </div>

            <div class="bg-purple-50 p-4 rounded-2xl border border-purple-200 space-y-2">
                <span class="text-xs font-black text-purple-700 uppercase tracking-wider">✨ AI Prompt Assistant</span>
                <p class="text-xs text-gray-600">Copy this prompt into ChatGPT or Copilot to design a beautiful presentation photo:</p>
                <textarea id="ai-prompt-box" readonly rows="2" class="w-full text-xs p-2 bg-white border border-purple-200 rounded-lg text-gray-500 font-mono">Type your deal description above...</textarea>
                <button type="button" onclick="copyPrompt()" id="copy-btn" class="w-full bg-purple-700 hover:bg-purple-800 text-white text-xs font-bold py-2 rounded-lg transition">📋 Copy Prompt Text</button>
            </div>

            <div>
                <label class="block text-lg font-bold text-gray-700 mb-1">Image URL</label>
                <input type="url" id="photo-url" placeholder="Paste your generated AI image link here, or leave blank for Admin to upload" class="w-full p-4 border-2 border-gray-300 rounded-xl text-sm font-medium">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Contact / Order Info</label>
                    <input type="text" id="contact-info" placeholder="WhatsApp or phone link" class="w-full p-3 border-2 border-gray-300 rounded-xl text-sm" required>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Offer Expiry Date</label>
                    <input type="date" id="expiry-date" class="w-full p-3 border-2 border-gray-300 rounded-xl text-sm" required>
                </div>
            </div>

            <button type="button" id="submit-btn" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white text-xl font-black py-4 rounded-xl shadow-md transition">
                🚀 PUSH TO PREVIEW & SUBMIT
            </button>
        </form>
    </div>

    <script>
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwXYdojCYrzDOQo8B8zsZ5_vLo7c-Afxo9ddIS-J8XHcM9HkOqJuNZvLgOYdkZTiGnb/exec";
const PROMOTER_WHATSAPP = "59995120536";

        const promoTextInput = document.getElementById('promo-text');
        const aiPromptBox = document.getElementById('ai-prompt-box');
        const copyBtn = document.getElementById('copy-btn');

        // Dynamic prompt builder
        promoTextInput.addEventListener('input', function() {
            const val = promoTextInput.value.trim() || "Special offer";
            aiPromptBox.value = `Commercial professional photography for retail advertisement showcasing: ${val.replace(/[\r\n]+/g, " ")}. Bright professional lighting, high-end production, minimalist background, 8k resolution, no text layers.`;
        });

        function copyPrompt() {
            aiPromptBox.select();
            navigator.clipboard.writeText(aiPromptBox.value);
            copyBtn.innerText = "💥 Copied! Paste in ChatGPT";
            setTimeout(() => { copyBtn.innerText = "📋 Copy Prompt Text"; }, 2000);
        }

        document.getElementById('submit-btn').addEventListener('click', function() {
            const deal = promoTextInput.value.trim();
            const contact = document.getElementById('contact-info').value.trim();
            const expiry = document.getElementById('expiry-date').value;
            const photo = document.getElementById('photo-url').value.trim() || "https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=600";
            const tier = document.getElementById('tier').value;
            const community = document.getElementById('community').value;

            if (!deal || !contact || !expiry) {
                alert("Please complete all fields!");
                return;
            }

            const uniqueId = "ad_" + Math.floor(1000 + Math.random() * 9000);
            const uploadUrl = `${GOOGLE_SCRIPT_URL}?action=createAd&id=${uniqueId}&photo=${encodeURIComponent(photo)}&text=${encodeURIComponent(deal)}&contact=${encodeURIComponent(contact)}&expiry=${encodeURIComponent(expiry)}&tier=${tier}&community=${community}`;

            document.getElementById('submit-btn').innerText = "⏳ Directing To Pipeline...";

            fetch(uploadUrl, { method: 'GET', mode: 'no-cors' })
            .then(() => {
                // Instantly open the public page in preview mode
                const previewUrl = `https://pracins360.github.io/Instant-Promo-Landing-Page-CW/page.html?id=${uniqueId}`;
                const waMessage = `Hello Admin! 🚀 New Ad Request:\n\n🆔 ID: ${uniqueId}\n👑 Tier: ${tier}\n🏙️ Group: ${community}\n📝 Offer: ${deal}\n\n👉 Review Draft Here: ${previewUrl}`;
                
                // Route to WhatsApp
                window.open(`https://wa.me/${PROMOTER_WHATSAPP}?text=${encodeURIComponent(waMessage)}`, '_blank');
                window.location.href = previewUrl; // Send user straight to look at their live preview card
            });
        });
    </script>
</body>
</html>
