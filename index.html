<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instant Landing Page Creator</title>
    <!-- Tailwind CSS for fast, massive, clean styling -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 font-sans min-h-screen flex flex-col items-center p-4">

    <!-- MAIN CREATOR CONTAINER -->
    <div id="creator-screen" class="w-full max-w-xl bg-white rounded-3xl shadow-xl p-6 my-4 border-4 border-blue-500">
        <h1 class="text-3xl font-extrabold text-center text-gray-800 mb-1">🚀 Go Live in 2 Minutes</h1>
        <p class="text-center text-gray-500 mb-6 font-medium">No tech skills needed. Just fill and snap!</p>

        <form id="landing-form" class="space-y-6">
            
            <!-- 1. CHOOSE YOUR STYLE -->
            <div>
                <label class="block text-xl font-bold text-gray-700 mb-2">1. Choose Your Style</label>
                <div class="grid grid-cols-2 gap-4">
                    <label class="border-4 border-blue-500 rounded-2xl p-4 text-center cursor-pointer block bg-blue-5 text-blue-900 font-bold text-lg relative">
                        <input type="radio" name="tier" value="basic" checked class="absolute top-3 right-3 scale-150">
                        ⭐ Basic<br><span class="text-xs font-normal text-gray-500">1 Photo • Simple</span>
                    </label>
                    <label class="border-2 border-gray-300 rounded-2xl p-4 text-center cursor-pointer block font-bold text-lg text-gray-700 relative hover:border-yellow-500">
                        <input type="radio" name="tier" value="gold" class="absolute top-3 right-3 scale-150">
                        👑 Gold<br><span class="text-xs font-normal text-gray-500">2 Photos • Stand Out</span>
                    </label>
                </div>
            </div>

            <!-- 2. YOUR PROMOTION PHOTO & AI ASSISTANT -->
            <div class="bg-blue-50 p-5 rounded-2xl border-2 border-blue-200 space-y-4">
                <label class="block text-xl font-bold text-gray-800">2. Your Promotion Photo 📸</label>
                
                <label class="flex flex-col items-center justify-center w-full h-28 border-4 border-dashed border-blue-300 rounded-xl cursor-pointer bg-white hover:bg-gray-50 text-center p-4">
                    <span class="text-2xl mb-1">📷</span>
                    <p class="text-sm font-bold text-gray-700">Tap to Take or Choose Photo</p>
                    <p id="upload-status" class="text-xs text-gray-400">Upload your own or use the AI helper below</p>
                    <input type="file" id="photo-input" accept="image/*" class="hidden" />
                </label>

                <!-- AI Style Helper Block from image_a2d0a7.png -->
                <div class="bg-white p-4 rounded-xl border border-blue-200 shadow-sm space-y-2">
                    <div class="flex items-center justify-between">
                        <span class="text-sm font-black text-purple-700 flex items-center gap-1">✨ AI Photo Style Helper</span>
                        <button type="button" onclick="generateAiPrompt()" class="bg-purple-600 hover:bg-purple-700 text-white text-xs font-bold px-3 py-1 rounded-lg cursor-pointer">
                            Generate Prompt
                        </button>
                    </div>
                    <p class="text-xs text-gray-500">Stuck finding a good picture? Copy this text into ChatGPT or Copilot to create a professional image instantly:</p>
                    <textarea id="ai-prompt-box" readonly rows="3" class="w-full text-xs p-3 bg-gray-50 border border-gray-200 rounded-lg font-mono text-gray-600 focus:outline-none focus:ring-0">Fill in your Deal below, then click Generate Prompt!</textarea>
                    <button type="button" onclick="copyPromptText()" id="copy-prompt-btn" class="w-full bg-slate-800 hover:bg-slate-900 text-white text-xs font-bold py-2 rounded-lg cursor-pointer">
                        📋 Copy AI Prompt
                    </button>
                </div>
            </div>

            <!-- 3. WHAT IS THE DEAL? -->
            <div>
                <div class="flex justify-between items-center mb-2">
                    <label class="block text-xl font-bold text-gray-700">3. What is the Deal?</label>
                    <span class="bg-gray-200 text-gray-600 font-bold px-2 py-0.5 rounded-full text-xs cursor-help" title="Keep it sweet and simple!">?</span>
                </div>
                <textarea id="promo-text" rows="3" placeholder="Type your special offer or announcement here..." class="w-full text-lg p-4 border-2 border-gray-300 rounded-2xl focus:border-blue-500 focus:outline-none font-medium text-gray-800"></textarea>
            </div>

            <!-- 4. HOW DO CUSTOMERS REACH YOU? + SOCIAL LINKS -->
            <div class="space-y-3">
                <label class="block text-xl font-bold text-gray-700">4. How do customers reach you?</label>
                <input type="text" id="contact-info" placeholder="Phone number, WhatsApp, or address" class="w-full text-lg p-4 border-2 border-gray-300 rounded-2xl focus:border-blue-500 focus:outline-none font-medium text-gray-800">
                
                <!-- Micro Social Inputs inside Section 4 to keep it minimal -->
                <div class="grid grid-cols-2 gap-2 pt-1">
                    <input type="text" id="link-fb" placeholder="🔗 Facebook Link" class="p-2 text-xs border border-gray-300 rounded-xl">
                    <input type="text" id="link-ig" placeholder="🔗 Instagram Link" class="p-2 text-xs border border-gray-300 rounded-xl">
                    <input type="text" id="link-tt" placeholder="🔗 TikTok Link" class="p-2 text-xs border border-gray-300 rounded-xl">
                    <input type="text" id="link-yt" placeholder="🔗 YouTube Link" class="p-2 text-xs border border-gray-300 rounded-xl">
                </div>
            </div>

            <!-- 5. WHEN DOES THIS OFFER END? -->
            <div>
                <label class="block text-xl font-bold text-gray-700 mb-2">5. When does this offer end?</label>
                <input type="date" id="expiry-date" class="w-full text-lg p-4 border-2 border-gray-300 rounded-2xl focus:border-blue-500 focus:outline-none font-medium text-gray-800">
            </div>

            <!-- SUBMIT ACTION -->
            <button type="button" id="submit-btn" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white text-2xl font-black py-5 px-4 rounded-2xl shadow-lg transform active:scale-95 transition tracking-wide cursor-pointer">
                🚀 MAKE ME LIVE INSTANTLY
            </button>
        </form>
    </div>

    <script>
       <script>
        let compressedImageDataUrl = "";
        const PROMOTER_WHATSAPP = "+59995551234"; // 🇨🇼 Change to your actual phone number

        // Wait for the page DOM to fully load before attaching listeners
        document.addEventListener("DOMContentLoaded", function() {

            const promoTextInput = document.getElementById('promo-text');
            const aiPromptBox = document.getElementById('ai-prompt-box');
            const copyPromptBtn = document.getElementById('copy-prompt-btn');
            const photoInput = document.getElementById('photo-input');
            const uploadStatus = document.getElementById('upload-status');
            const submitBtn = document.getElementById('submit-btn');

            // IMAGE LOCAL COMPRESSION LOGIC
            if (photoInput) {
                photoInput.addEventListener('change', function(e) {
                    const file = e.target.files[0];
                    if (!file) return;
                    uploadStatus.innerText = "⏳ Preparing layout...";
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = function(event) {
                        const img = new Image();
                        img.src = event.target.result;
                        img.onload = function() {
                            const canvas = document.createElement('canvas');
                            const ctx = canvas.getContext('2d');
                            const MAX = 700;
                            let w = img.width, h = img.height;
                            if (w > h ? w > MAX : h > MAX) {
                                if (w > h) { h *= MAX / w; w = MAX; } else { w *= MAX / h; h = MAX; }
                            }
                            canvas.width = w; canvas.height = h;
                            ctx.drawImage(img, 0, 0, w, h);
                            compressedImageDataUrl = canvas.toDataURL('image/jpeg', 0.65);
                            uploadStatus.innerText = "✅ Image Optimized & Ready!";
                        }
                    }
                });
            }

            // AI PROMPT GENERATION LOGIC
            window.generateAiPrompt = function() {
                const promoText = promoTextInput.value.trim() || "Special promotion offer";
                const cleanPromo = promoText.replace(/[\r\n]+/g, " ");
                
                aiPromptBox.value = `Commercial food and lifestyle photography banner, high-quality modern marketing image showcasing: ${cleanPromo}. Clean minimal composition, bright professional studio lighting, depth of field, hyper-realistic, 8k, crisp details. Perfect for a local retail landing page. No text or graphic design layers in image.`;
                copyPromptBtn.innerText = "📋 Copy AI Prompt";
                copyPromptBtn.className = "w-full bg-slate-800 hover:bg-slate-900 text-white text-xs font-bold py-2 rounded-lg cursor-pointer";
            };

            // COPY TO CLIPBOARD LOGIC
            window.copyPromptText = function() {
                if (!aiPromptBox.value || aiPromptBox.value.startsWith("Fill in your Deal")) {
                    alert("Please type a deal first to generate a professional prompt!");
                    return;
                }
                aiPromptBox.select();
                aiPromptBox.setSelectionRange(0, 99999);
                navigator.clipboard.writeText(aiPromptBox.value)
                    .then(() => {
                        copyPromptBtn.innerText = "💥 COPIED! Paste into ChatGPT/Copilot.";
                        copyPromptBtn.className = "w-full bg-purple-600 text-white text-xs font-bold py-2 rounded-lg";
                    })
                    .catch(() => {
                        alert("Failed to copy automatically. Please select the text manually.");
                    });
            };

            // AUTO-UPDATING PROMPT LOOP (Triggers as they type)
            if (promoTextInput) {
                promoTextInput.addEventListener('input', generateAiPrompt);
            }

            // FORM SUBMISSION & WHATSAPP REDIRECT (This is the section that went idle)
            if (submitBtn) {
                submitBtn.addEventListener('click', function() {
                    const deal = promoTextInput.value.trim();
                    const contact = document.getElementById('contact-info').value.trim();
                    
                    if (!deal || !contact) {
                        alert("Please fill out your deal and contact info first!");
                        return;
                    }

                    // Generate dynamic key elements
                    const uniqueId = "ad_" + Math.floor(1000 + Math.random() * 9000);
                    
                    // Correct live .github.io deployment target link
                    const reviewUrl = `https://pracins360.github.io/Instant-Promo-Landing-Page-CW/page.html?id=${uniqueId}&admin=true`;
                    
                    // Format the payload string for WhatsApp dispatch
                    const message = `Hello Admin! 🚀 New Ad Submission for review:\n\n🆔 ID: ${uniqueId}\n📝 Deal: ${deal}\n📱 Contact: ${contact}\n\n👉 Review & Activate here: ${reviewUrl}`;
                    
                    // Launch window session
                    window.open(`https://wa.me/${PROMOTER_WHATSAPP}?text=${encodeURIComponent(message)}`, '_blank');
                });
            }
        });
    </script>
    </body>
</html>
