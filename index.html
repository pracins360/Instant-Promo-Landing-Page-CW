<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Your Promo Page</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 font-sans p-4 min-h-screen flex flex-col items-center">

    <div class="w-full max-w-xl bg-white rounded-3xl shadow-xl p-6 my-4 border-4 border-blue-500">
        <h1 class="text-3xl font-extrabold text-center text-gray-800 mb-1">🚀 Launch Your Promo</h1>
        <p class="text-center text-sm text-gray-500 mb-6">Closed-Community Alliance Sales Portal</p>

        <form id="promo-form" class="space-y-5">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Select Tier</label>
                    <select id="tier" class="w-full p-3 border-2 border-gray-300 rounded-xl font-bold bg-white">
                        <option value="basic">⭐ Basic (1 Photo)</option>
                        <option value="gold">👑 Gold (2 Photos)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Community Target</label>
                    <select id="community" class="w-full p-3 border-2 border-gray-300 rounded-xl font-bold bg-white">
                        <option value="OTRABANDA">🏙️ Otrabanda</option>
                        <option value="PUNDA">🏙️ Punda.com</option>
                        <option value="SALINA">🛍️ Salina.com</option>
                        <option value="SAMBIL">🏬 Sambil.com</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="block text-lg font-bold text-gray-700 mb-1">What is the Deal?</label>
                <textarea id="promo-text" rows="3" placeholder="Example: 20% Off all luxury bags today only!" class="w-full p-4 border-2 border-gray-300 rounded-xl text-lg font-medium" required></textarea>
            </div>

            <div class="bg-slate-50 p-4 rounded-2xl border border-slate-200 space-y-3">
                <span class="text-xs font-black text-slate-700 uppercase tracking-wider block">📸 Product Presentation Photo</span>
                
                <div>
                    <label class="block text-xs text-gray-500 font-bold mb-1">Option A: Upload real item snapshot from your shop floor</label>
                    <input type="file" id="real-photo" accept="image/*" class="w-full text-xs text-gray-600 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                </div>

                <div class="border-t border-gray-200 pt-2">
                    <label class="block text-xs text-gray-500 font-bold mb-1">Option B: Let Admin design using AI prompt quota instead</label>
                    <textarea id="ai-prompt-box" readonly rows="2" class="w-full text-[11px] p-2 bg-white border rounded-lg text-gray-400 font-mono">Type your deal description above to build prompt...</textarea>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Contact / WhatsApp Info</label>
                    <input type="text" id="contact-info" placeholder="e.g., 59995120536" class="w-full p-3 border-2 border-gray-300 rounded-xl text-sm" required>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Offer Expiry Date</label>
                    <input type="date" id="expiry-date" class="w-full p-3 border-2 border-gray-300 rounded-xl text-sm" required>
                </div>
            </div>

            <button type="button" id="submit-btn" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white text-xl font-black py-4 rounded-xl shadow-md transition">
                🚀 PUSH TO PIPELINE
            </button>
        </form>
    </div>

    <script>
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwXYdojCYrzDOQo8B8zsZ5_vLo7c-Afxo9ddIS-J8XHcM9HkOqJuNZvLgOYdkZTiGnb/exec"; 
        const PROMOTER_WHATSAPP = "59995120536";

        const promoTextInput = document.getElementById('promo-text');
        const aiPromptBox = document.getElementById('ai-prompt-box');

        // Dynamically track prompt updates
        promoTextInput.addEventListener('input', function() {
            const val = promoTextInput.value.trim() || "Special offer";
            aiPromptBox.value = `Commercial product photography for retail ad showcasing: ${val.replace(/[\r\n]+/g, " ")}. Studio light background, 8k resolution.`;
        });

        document.getElementById('submit-btn').addEventListener('click', function() {
            const deal = promoTextInput.value.trim();
            const contact = document.getElementById('contact-info').value.trim();
            const expiry = document.getElementById('expiry-date').value;
            const tier = document.getElementById('tier').value;
            const community = document.getElementById('community').value;
            const fileInput = document.getElementById('real-photo');

            if (!deal || !contact || !expiry) {
                alert("Please fill out all merchant layout spaces!");
                return;
            }

            const uniqueId = "ad_" + Math.floor(1000 + Math.random() * 9000);
            
            // Check if they uploaded a real image item reference file
            let photoNote = "None (Use AI Generator prompt)";
            if(fileInput.files.length > 0) {
                photoNote = `📸 ATTACHED REAL PRODUCT IMAGE: "${fileInput.files[0].name}"`;
            }

            // Fire off background save text string request packet
            const uploadUrl = `${GOOGLE_SCRIPT_URL}?action=createAd&id=${uniqueId}&tier=${tier}&text=${encodeURIComponent(deal)}&contact=${encodeURIComponent(contact)}&community=${community}&expiry=${expiry}`;
            
            document.getElementById('submit-btn').innerText = "⏳ Dispatching Row Data...";

            fetch(uploadUrl, { method: 'GET', mode: 'no-cors' })
            .then(() => {
                const previewUrl = `https://pracins360.github.io/Instant-Promo-Landing-Page-CW/page.html?id=${uniqueId}`;
                
                // Build a crystal-clear message string for your WhatsApp inbox
                const waMessage = `Hello Admin! 🚀 New Ad Submission Request:\n\n🆔 ID: ${uniqueId}\n👑 Tier: ${tier.toUpperCase()}\n📍 Group Alliance: ${community}\n📝 Deal text: "${deal}"\n🖼️ Photo Source: ${photoNote}\n✨ AI Backup Prompt: ${aiPromptBox.value}\n\n👉 Live Preview Link: ${previewUrl}`;
                
                // Open WhatsApp natively
                window.open(`https://wa.me/${PROMOTER_WHATSAPP}?text=${encodeURIComponent(waMessage)}`, '_blank');
                window.location.href = previewUrl;
            });
        });
    </script>
</body>
</html>
