<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Promotion Page</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body class="bg-gray-100 font-sans min-h-screen flex flex-col items-center p-4">

    <!-- NO DATA / LOADING STATE -->
    <div id="loading-screen" class="w-full max-w-md bg-white rounded-3xl shadow-xl p-8 text-center my-10">
        <span class="text-4xl">⏳</span>
        <h2 class="text-xl font-bold text-gray-700 mt-2">Loading Offer Details...</h2>
    </div>

    <!-- PENDING AD SCREEN (For Public viewers if not paid yet) -->
    <div id="pending-screen" class="hidden w-full max-w-md bg-white rounded-3xl shadow-xl p-8 text-center my-10 border-4 border-yellow-500">
        <span class="text-5xl">⏳</span>
        <h2 class="text-2xl font-black text-gray-800 mt-4">Offer Pending Activation</h2>
        <p class="text-gray-500 mt-2 font-medium">This business landing page is awaiting setup confirmation.</p>
    </div>

    <!-- MAIN DISPLAY SCREEN (What the customer sees) -->
    <div id="main-ad-screen" class="hidden w-full max-w-md bg-white rounded-3xl shadow-2xl overflow-hidden my-4 border-2 border-gray-200">
        <div id="live-badge" class="bg-emerald-500 text-white text-center py-2 font-black tracking-widest text-xs hidden">
            ✨ ACTIVE PROMOTION ✨
        </div>
        
        <img id="ad-img" src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=600" alt="Promo Layout" class="w-full h-64 object-cover">
        
        <div class="p-6 space-y-4">
            <p id="ad-text" class="text-2xl font-extrabold text-gray-900 break-words">Loading special deal...</p>
            
            <div class="bg-blue-50 p-4 rounded-xl border border-blue-100">
                <p class="text-xs font-bold text-blue-400 uppercase tracking-wider">How to Claim / Order:</p>
                <p id="ad-contact" class="text-lg font-black text-blue-700 break-words"></p>
            </div>

            <div class="flex justify-between items-center text-sm font-bold bg-red-50 text-red-600 px-4 py-2 rounded-xl">
                <span>⏳ Valid Until:</span>
                <span id="ad-date">--/--/----</span>
            </div>
        </div>

        <!-- GENERATED STATIC QR CODE FOOTER (Stays same forever) -->
        <div class="p-6 bg-gray-50 border-t border-gray-200 flex flex-col items-center justify-center">
            <p class="text-xs font-bold text-gray-400 uppercase mb-2">Scan to share this deal:</p>
            <div id="qrcode" class="p-2 bg-white rounded-xl shadow-sm border border-gray-100"></div>
        </div>
    </div>

    <!-- FLOATING ADMIN CONTROL BAR (Only visible if admin=true) -->
    <div id="admin-bar" class="hidden fixed bottom-0 left-0 right-0 bg-slate-900 text-white p-4 shadow-2xl flex flex-col items-center justify-center border-t-4 border-yellow-500 z-50">
        <p class="text-xs font-bold uppercase tracking-wider text-yellow-400 mb-2">👮 Admin / Promoter Dashboard</p>
        <button id="toggle-status-btn" onclick="activateAd()" class="w-full max-w-sm bg-emerald-500 hover:bg-emerald-600 text-white font-black py-3 rounded-xl shadow-md text-lg transition tracking-wide cursor-pointer">
            🔓 CLICK TO APPROVE & ACTIVATE AD
        </button>
    </div>

    <script>
        // Paste your web app url from deployment step here
        const GOOGLE_SCRIPT_URL = "YOUR_DEPLOYED_WEB_APP_URL_HERE"; 
        const SECRET_TOKEN = "MySuperSecretPassword123";

        const urlParams = new URLSearchParams(window.location.search);
        const adId = urlParams.get('id');
        const isAdmin = urlParams.get('admin');

        document.addEventListener("DOMContentLoaded", function() {
            if (!adId) {
                document.getElementById('loading-screen').innerHTML = "❌ Invalid Link (Missing ID)";
                return;
            }

            // Generate the fixed physical QR code for this specific ad layout
            // This URL target remains constant forever!
            const cleanUrl = window.location.href.split('&')[0]; // strip the admin parameters out
            new QRCode(document.getElementById("qrcode"), {
                text: cleanUrl,
                width: 120,
                height: 120
            });

            // If you opened it from the WhatsApp link, reveal your hidden floating dashboard bar
            if (isAdmin === 'true') {
                document.getElementById('admin-bar').classList.remove('hidden');
            }

            // SIMULATION FUNCTION: Fetches row configuration from database
            // In a real database loop, fetch() requests the script data row matching adId
            loadMockData(); 
        });

        function loadMockData() {
            document.getElementById('loading-screen').classList.add('hidden');
            
            // Simulating database pull state logic
            const isRowPaid = false; // Switch to true to check active view

            if (!isRowPaid && isAdmin !== 'true') {
                document.getElementById('pending-screen').classList.remove('hidden');
            } else {
                document.getElementById('main-ad-screen').classList.remove('hidden');
                if (isRowPaid) document.getElementById('live-badge').classList.remove('hidden');
                
                // Fallback rendering text until real sheet fetch updates it
                document.getElementById('ad-text').innerText = "Ad Preview: Type deal elements inside the submission manager.";
                document.getElementById('ad-contact').innerText = "Contact Info Placeholder";
            }
        }

        function activateAd() {
            const btn = document.getElementById('toggle-status-btn');
            btn.innerText = "⏳ Saving Status to Google Sheet...";
            btn.disabled = true;

            // Send actual execution payload directly to your running sheet webapp instance
            fetch(`${GOOGLE_SCRIPT_URL}?id=${adId}&token=${SECRET_TOKEN}&status=Active`, { method: 'GET', mode: 'no-cors' })
            .then(() => {
                btn.innerText = "✅ AD ACTIVATED & LIVE FOR CUSTOMERS!";
                btn.className = "w-full max-w-sm bg-blue-600 text-white font-black py-3 rounded-xl shadow-md text-lg text-center";
            })
            .catch(err => {
                btn.innerText = "Error contacting sheet API";
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
