<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promotion Details</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body class="bg-gray-100 font-sans min-h-screen flex flex-col items-center p-4 pb-20">

    <div id="loading" class="text-center py-12 font-bold text-gray-500">⏳ Accessing Database Entry...</div>

    <div id="pending-card" class="hidden w-full max-w-md bg-white rounded-3xl shadow-xl p-8 text-center border-4 border-yellow-500 my-6">
        <span class="text-5xl">⏳</span>
        <h2 class="text-2xl font-black text-gray-800 mt-4">Draft Created Successfully!</h2>
        <p class="text-gray-500 mt-2 text-sm font-medium">Your ad draft layout is secure. It will instantly go live globally as soon as the promoter clears the Sentoo verification payment.</p>
    </div>

    <div id="promo-card" class="hidden w-full max-w-md bg-white rounded-3xl shadow-2xl overflow-hidden border border-gray-200">
        <img src="current-banner.jpg" alt="Campaign Banner" class="w-full h-auto object-cover border-b">

        <div class="p-6 space-y-4">
            <img id="ad-img" src="" class="w-full h-64 object-cover rounded-xl shadow-inner">
            <h2 id="ad-community" class="inline-block bg-blue-600 text-white text-xs font-black px-3 py-1 rounded-full uppercase tracking-widest"></h2>
            <p id="ad-text" class="text-2xl font-extrabold text-gray-900 break-words"></p>
            
            <div class="bg-blue-50 p-4 rounded-xl border border-blue-100">
                <span class="text-xs font-black text-blue-500 uppercase tracking-wider block mb-1">Claim Offer via:</span>
                <p id="ad-contact" class="text-lg font-black text-blue-800 break-words"></p>
            </div>

            <div class="flex justify-between items-center text-xs font-bold bg-red-50 text-red-600 p-3 rounded-xl">
                <span>⏰ Promotion Closes:</span>
                <span id="ad-date"></span>
            </div>
        </div>

        <div class="p-4 bg-gray-50 border-t flex flex-col items-center">
            <div id="qrcode" class="bg-white p-2 border rounded-xl shadow-sm"></div>
        </div>
    </div>

    <script>
        const GOOGLE_SCRIPT_URL = "YOUR_DEPLOYED_WEB_APP_URL_HERE";
        const urlParams = new URLSearchParams(window.location.search);
        const adId = urlParams.get('id');

        if (adId) {
            new QRCode(document.getElementById("qrcode"), { text: window.location.href, width: 100, height: 100 });

            fetch(`${GOOGLE_SCRIPT_URL}?action=getAd&id=${adId}`)
            .then(res => res.json())
            .then(data => {
                document.getElementById('loading').classList.add('hidden');
                if (data.error) {
                    document.getElementById('loading').innerHTML = "❌ Promotion entry missing or expired.";
                    document.getElementById('loading').classList.remove('hidden');
                    return;
                }

                if (data.Status !== "Active") {
                    document.getElementById('pending-card').classList.remove('hidden');
                } else {
                    document.getElementById('promo-card').classList.remove('hidden');
                    document.getElementById('ad-img').src = data.Photo_URL;
                    document.getElementById('ad-community').innerText = `📍 Group: ${data.Social_Links}`; // we map community tag here
                    document.getElementById('ad-text').innerText = data.Promo_Text;
                    document.getElementById('ad-contact').innerText = data.Contact_Info;
                    document.getElementById('ad-date').innerText = data.Expiry_Date;
                }
            });
        }
    </script>
</body>
</html>
